version: '3.9'

services:
  # --- Backend API (Node.js / Express) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rb-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - FRONTEND_ORIGIN=http://localhost:3000
      - JWT_SECRET=supersecretkey
      - JWT_REFRESH_SECRET=superrefreshsecretkey
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=smartresearch
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - neo4j
    restart: unless-stopped

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rb-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  # --- PostgreSQL 16 (Source of Truth) ---
  postgres:
    image: postgres:16-alpine
    container_name: rb-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # --- Redis 7 (Cache & OTP Rate-Limiting) ---
  redis:
    image: redis:7-alpine
    container_name: rb-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # --- Neo4j 5 (Trust-Graph) ---
  neo4j:
    image: neo4j:5
    container_name: rb-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # --- Elasticsearch 8 (Search) ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: rb-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  es_data:
