version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: research-bridge-backend
    container_name: rb-backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - PORT=5000
    networks:
      - research-bridge-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: research-bridge-frontend
    container_name: rb-frontend
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - research-bridge-net
    depends_on:
      - backend

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    image: research-bridge-ml
    container_name: rb-ml
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - research-bridge-net
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: rb-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-researchbridge}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - research-bridge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rb-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - research-bridge-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: rb-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - research-bridge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: rb-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    networks:
      - research-bridge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474 > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rb-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - research-bridge-net
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  research-bridge-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  esdata:
  neo4jdata:
  miniodata:

