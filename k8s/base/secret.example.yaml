# Example Secret — copy to secret.yaml and fill in real values (DO NOT commit secret.yaml).
# Create in-cluster with:  kubectl create secret generic researchbridge-secrets --from-env-file=.env.secrets
apiVersion: v1
kind: Secret
metadata:
  name: researchbridge-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/researchbridge"
  POSTGRES_PASSWORD: "postgres"
  NEO4J_AUTH: "neo4j/password"
  JWT_ACCESS_SECRET: "change_me_access"
  JWT_REFRESH_SECRET: "change_me_refresh"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  HF_API_TOKEN: "hf_xxx_set_me"
