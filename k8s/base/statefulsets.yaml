# In-cluster stateful backing services (PostgreSQL, Redis, Elasticsearch, Neo4j, MinIO).
# Each is a single-replica StatefulSet with a PersistentVolumeClaim template + a
# ClusterIP Service whose name matches the hostnames in researchbridge-config.
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: postgres }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: researchbridge-secrets, key: POSTGRES_PASSWORD, optional: true } }
            - { name: POSTGRES_DB, value: researchbridge }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts: [{ name: pgdata, mountPath: /var/lib/postgresql/data }]
  volumeClaimTemplates:
    - metadata: { name: pgdata }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 5Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          volumeMounts: [{ name: redisdata, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: redisdata }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 1Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
spec:
  selector: { app: elasticsearch }
  ports: [{ port: 9200, targetPort: 9200 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
spec:
  serviceName: elasticsearch
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata: { labels: { app: elasticsearch } }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
          ports: [{ containerPort: 9200 }]
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          resources:
            requests: { memory: "1Gi" }
            limits: { memory: "2Gi" }
          volumeMounts: [{ name: esdata, mountPath: /usr/share/elasticsearch/data }]
  volumeClaimTemplates:
    - metadata: { name: esdata }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 5Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector: { app: neo4j }
  ports:
    - { name: http, port: 7474, targetPort: 7474 }
    - { name: bolt, port: 7687, targetPort: 7687 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector: { matchLabels: { app: neo4j } }
  template:
    metadata: { labels: { app: neo4j } }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports: [{ containerPort: 7474 }, { containerPort: 7687 }]
          env:
            - name: NEO4J_AUTH
              valueFrom: { secretKeyRef: { name: researchbridge-secrets, key: NEO4J_AUTH, optional: true } }
            - { name: NEO4J_PLUGINS, value: '["apoc", "graph-data-science"]' }
          volumeMounts: [{ name: neo4jdata, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: neo4jdata }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 5Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports: [{ containerPort: 9000 }, { containerPort: 9001 }]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: researchbridge-secrets, key: S3_ACCESS_KEY, optional: true } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: researchbridge-secrets, key: S3_SECRET_KEY, optional: true } }
          volumeMounts: [{ name: miniodata, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: miniodata }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 5Gi } } }
